<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONPlaceholder CRUD Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f5;
    color:#333;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    margin-bottom:25px;
    text-align:center;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:24px;
    margin-bottom:24px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

h2{
    margin-bottom:16px;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:12px;
    font-size:15px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    background:#111827;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#000;
}

.button-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.post{
    border:1px solid #eee;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.post h3{
    margin-bottom:8px;
}

.post p{
    color:#555;
    line-height:1.5;
}

small{
    color:#888;
}

.message{
    margin-top:15px;
    padding:12px;
    border-radius:8px;
    display:none;
    background:#e8fff0;
    color:#067647;
}

.loading{
    text-align:center;
    color:#888;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>JSONPlaceholder API Demo</h1>

<!-- Create Post -->
<div class="card">

<h2>Create Post</h2>

<input
type="text"
id="title"
placeholder="Post title">

<textarea
id="body"
placeholder="Write something..."></textarea>

<button onclick="createPost()">
Create Post
</button>

<div
id="message"
class="message">
</div>

</div>

<!-- Get Post by ID -->
<div class="card">

<h2>Get Post by ID</h2>

<div class="button-row">

<input
type="number"
id="postId"
placeholder="Enter Post ID (1-100)"
min="1"
max="100"
style="flex:1;">

<button onclick="getPostById()">
Search
</button>

</div>

<div id="singlePost"></div>

</div>

<!-- Get All Posts -->
<div class="card">

<div class="button-row">

<h2>All Posts</h2>

<button onclick="loadPosts()">
Refresh
</button>

</div>

<div id="posts">
<div class="loading">Loading posts...</div>
</div>

</div>

</div>

<script>

const API = "https://jsonplaceholder.typicode.com/posts";

// Load All Posts
async function loadPosts(){

    const container = document.getElementById("posts");

    container.innerHTML =
    '<div class="loading">Loading...</div>';

    try{

        const response = await fetch(API);
        const posts = await response.json();

        container.innerHTML = "";

        posts.slice(0,10).forEach(post=>{

            container.innerHTML += `
                <div class="post">
                    <h3>${post.id}. ${post.title}</h3>
                    <p>${post.body}</p>
                    <small>User ID: ${post.userId}</small>
                </div>
            `;

        });

    }catch{

        container.innerHTML =
        "<p>Unable to load posts.</p>";

    }

}

// Get Post By ID
async function getPostById(){

    const id = document.getElementById("postId").value;
    const container = document.getElementById("singlePost");

    if(!id){

        alert("Please enter a Post ID.");
        return;

    }

    container.innerHTML =
    '<div class="loading">Loading...</div>';

    try{

        const response = await fetch(`${API}/${id}`);

        if(!response.ok){

            throw new Error("Post not found.");

        }

        const post = await response.json();

        container.innerHTML = `
            <div class="post">
                <h3>${post.id}. ${post.title}</h3>
                <p>${post.body}</p>
                <small>User ID: ${post.userId}</small>
            </div>
        `;

    }catch(error){

        container.innerHTML =
        `<p style="color:red;">${error.message}</p>`;

    }

}

// Create Post
async function createPost(){

    const title = document.getElementById("title").value.trim();
    const body = document.getElementById("body").value.trim();
    const message = document.getElementById("message");

    if(!title || !body){

        alert("Please complete all fields.");
        return;

    }

    try{

        const response = await fetch(API,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                title,
                body,
                userId:1

            })

        });

        const post = await response.json();

        message.style.display = "block";

        message.innerHTML = `
            <strong>Post created successfully!</strong><br><br>
            ID: ${post.id}<br>
            Title: ${post.title}
        `;

        document.getElementById("title").value = "";
        document.getElementById("body").value = "";

    }catch{

        alert("Unable to create post.");

    }

}

// Load posts when page opens
loadPosts();

</script>

</body>
</html>
